<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ app_name }}</title>
    <link rel="stylesheet" href="/static/css/app.css" />
  </head>
  <body>
    <main class="layout">
      <section class="map-panel">
        <header class="toolbar">
          <div>
            <h1>UAir-raid-analytics</h1>
            <p>Historical air raid alert statistics by Ukrainian region.</p>
          </div>
          <div class="controls" aria-label="Map filters">
            <label>
              Period
              <select id="days">
                <option value="7" selected>7 days</option>
                <option value="14">14 days</option>
                <option value="30">30 days</option>
              </select>
            </label>
            <label>
              Mode
              <select id="mode">
                <option value="combined" selected>Combined</option>
                <option value="count">Count</option>
                <option value="duration">Duration</option>
              </select>
            </label>
            <label>
              Theme
              <select id="theme">
                <option value="light" selected>Light</option>
                <option value="dark">Dark</option>
              </select>
            </label>
          </div>
        </header>
        <div id="map" aria-label="Ukraine alert statistics map">
          <svg
            id="ukraine-map"
            role="img"
            aria-label="Ukraine regions colored by alert statistics"
            preserveAspectRatio="xMidYMid meet"
          ></svg>
        </div>
        <p id="map-status" class="status"></p>
      </section>

      <aside class="details" id="region-details" aria-hidden="true" aria-live="polite">
        <div class="details-header">
          <h2 id="region-title">Select a region</h2>
          <button id="details-close" type="button" aria-label="Close details">&times;</button>
        </div>
        <dl class="metrics">
          <div>
            <dt>Alerts</dt>
            <dd id="metric-count">-</dd>
          </div>
          <div>
            <dt>Total duration</dt>
            <dd id="metric-duration">-</dd>
          </div>
          <div>
            <dt>Average duration</dt>
            <dd id="metric-average">-</dd>
          </div>
        </dl>
        <div id="daily-chart" class="daily-chart" aria-label="Daily region statistics"></div>
      </aside>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/d3-array@3"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3-geo@3"></script>
    <script src="/static/js/app.js"></script>
  </body>
</html>
