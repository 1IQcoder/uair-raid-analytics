<!doctype html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ app_name }}</title>
    <link
      rel="icon"
      href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="12" fill="%230d121a"/><path d="M18 42h28l-4-18c-1-5-5-8-10-8s-9 3-10 8l-4 18Z" fill="%23c91d2e"/><path d="M15 47h34" stroke="%23f7f9fc" stroke-width="6" stroke-linecap="round"/><path d="M32 8v5M14 16l4 4M50 16l-4 4" stroke="%23f7f9fc" stroke-width="4" stroke-linecap="round"/></svg>'
    />
    <link rel="stylesheet" href="/static/css/app.css" />
  </head>
  <body>
    <main class="layout">
      <section class="map-panel">
        <header class="toolbar">
          <div class="brand">
            <div class="title-row">
              <h1>UAir-raid-analytics</h1>
              <svg class="title-icon" viewBox="0 0 64 64" aria-hidden="true">
                <path d="M18 42h28l-4-18c-1-5-5-8-10-8s-9 3-10 8l-4 18Z" />
                <path d="M15 47h34" />
                <path d="M32 8v5M14 16l4 4M50 16l-4 4" />
              </svg>
            </div>
          </div>
          <div class="toolbar-actions">
            <span id="filter-summary" class="filter-summary" aria-live="polite"></span>
            <a class="nav-link" href="/about" data-i18n="nav.about">Про проект</a>
            <button class="icon-button" id="theme-toggle" type="button" data-i18n-aria-label="theme.dark"></button>
            <button class="language-button" id="language-toggle" type="button" data-i18n-aria-label="language.toggle">EN</button>
            <div class="popover" id="filters-popover">
              <button
                class="action-button"
                id="filters-toggle"
                type="button"
                aria-expanded="false"
                aria-controls="filters-panel"
              >
                Фільтри
              </button>
              <div class="popover-panel filter-panel" id="filters-panel" hidden>
                <label>
                  <span data-i18n="filters.mapLevel">Рівень карти</span>
                  <select id="map-level">
                    <option value="regions" selected data-i18n="filters.regions">Області</option>
                    <option value="districts" data-i18n="filters.districts">Райони</option>
                  </select>
                </label>
                <label class="toggle-field">
                  <input id="show-labels" type="checkbox" checked />
                  <span data-i18n="filters.showLabels">Показувати назви областей</span>
                </label>
                <div class="date-fields">
                  <label>
                    <span data-i18n="filters.startDate">Дата початку</span>
                    <input id="start-date" type="date" />
                  </label>
                  <label>
                    <span data-i18n="filters.endDate">Дата завершення</span>
                    <input id="end-date" type="date" />
                  </label>
                </div>
                <label>
                  <span data-i18n="filters.period">Період</span>
                  <select id="days">
                    <option value="7" selected data-i18n="filters.sevenDays">7 днів</option>
                    <option value="14" data-i18n="filters.fourteenDays">14 днів</option>
                    <option value="30" data-i18n="filters.thirtyDays">30 днів</option>
                  </select>
                </label>
                <label>
                  <span data-i18n="filters.mode">Метрика</span>
                  <select id="mode">
                    <option value="combined" selected data-i18n="filters.combined">Комбіновано</option>
                    <option value="count" data-i18n="filters.count">Кількість</option>
                    <option value="duration" data-i18n="filters.duration">Тривалість</option>
                  </select>
                </label>
              </div>
            </div>
          </div>
        </header>
        <div id="map" aria-label="Ukraine alert statistics map">
          <svg
            id="ukraine-map"
            role="img"
            aria-label="Ukraine regions colored by alert statistics"
            preserveAspectRatio="xMidYMid meet"
          ></svg>
        </div>
      </section>
      <section class="update-log" id="update-log-panel" aria-live="polite">
        <div class="update-log-header">
          <h2 data-i18n="updates.title">Оновлення</h2>
          <span id="update-log-status">-</span>
        </div>
        <div id="update-log-list" class="update-log-list"></div>
      </section>
      <nav class="bottom-menu" aria-label="Map tools">
        <button class="bottom-menu-button" id="bottom-filters-toggle" type="button" aria-label="Фільтри" data-i18n-aria-label="common.filters" aria-expanded="false" aria-controls="filters-panel">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 6h16M7 12h10M10 18h4" />
          </svg>
          <span data-i18n="common.filters">Фільтри</span>
        </button>
        <button class="bottom-menu-button" id="update-log-toggle" type="button" aria-label="Журнал оновлень" data-i18n-aria-label="common.updateLog" aria-expanded="false" aria-controls="update-log-panel">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M5 5v14h14M8 15l3-3 3 2 4-6" />
          </svg>
        </button>
      </nav>
      <div id="map-tooltip" class="map-tooltip" role="status" aria-hidden="true"></div>

      <aside class="details" id="region-details" aria-hidden="true" aria-live="polite">
        <div class="details-header">
          <h2 id="region-title" data-i18n="details.selectRegion">Оберіть регіон</h2>
          <button id="details-close" type="button" aria-label="Закрити деталі" data-i18n-aria-label="details.close">&times;</button>
        </div>
        <dl class="metrics">
          <div>
            <dt data-i18n="details.alerts">Тривоги</dt>
            <dd id="metric-count">-</dd>
          </div>
          <div>
            <dt data-i18n="details.totalDuration">Загальна тривалість</dt>
            <dd id="metric-duration">-</dd>
          </div>
          <div>
            <dt data-i18n="details.averageDuration">Середня тривалість</dt>
            <dd id="metric-average">-</dd>
          </div>
        </dl>
        <div id="daily-chart" class="daily-chart" aria-label="Daily region statistics"></div>
      </aside>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/d3-array@3"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3-geo@3"></script>
    <script src="/static/js/i18n.js"></script>
    <script src="/static/js/theme.js"></script>
    <script src="/static/js/app.js"></script>
  </body>
</html>
