<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ app_name }}</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIINfQEMfQNLxEibxyf4KfrF5RQr7u+0oHM="
      crossorigin=""
    />
    <link rel="stylesheet" href="/static/css/app.css" />
  </head>
  <body>
    <main class="layout">
      <section class="map-panel">
        <header class="toolbar">
          <div>
            <h1>UAir-raid-analytics</h1>
            <p>Historical air raid alert statistics by Ukrainian region.</p>
          </div>
          <div class="controls" aria-label="Map filters">
            <label>
              Period
              <select id="days">
                <option value="7" selected>7 days</option>
                <option value="14">14 days</option>
                <option value="30">30 days</option>
              </select>
            </label>
            <label>
              Mode
              <select id="mode">
                <option value="combined" selected>Combined</option>
                <option value="count">Count</option>
                <option value="duration">Duration</option>
              </select>
            </label>
          </div>
        </header>
        <div id="map" aria-label="Ukraine alert statistics map"></div>
        <p id="map-status" class="status"></p>
      </section>

      <aside class="details" aria-live="polite">
        <h2 id="region-title">Select a region</h2>
        <dl class="metrics">
          <div>
            <dt>Alerts</dt>
            <dd id="metric-count">-</dd>
          </div>
          <div>
            <dt>Total duration</dt>
            <dd id="metric-duration">-</dd>
          </div>
          <div>
            <dt>Average duration</dt>
            <dd id="metric-average">-</dd>
          </div>
        </dl>
        <canvas id="daily-chart" height="260"></canvas>
      </aside>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <script src="/static/js/app.js"></script>
  </body>
</html>
